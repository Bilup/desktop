name: Build (Manual)

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install strip-nondeterminism
      run: sudo apt-get install strip-nondeterminism
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install Yarn
      run: npm install -g yarn
    - name: Install dependencies
      run: yarn install --ignore-engines --ignore-scripts
    - name: Fetch
      run: yarn run fetch
    - name: Compile
      run: yarn run webpack:prod
    - name: Package
      run: |
        node release-automation/build.mjs --debian --tarball --appimage --x64 --armv7l --arm64
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: |
          dist/*.deb
          dist/*.tar.gz
          dist/*.AppImage
    - name: Upload package-lock.json
      uses: actions/upload-artifact@v4
      with:
        name: package-lock-linux
        path: package-lock.json

  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install Yarn
      run: npm install -g yarn
    - name: Install dependencies
      run: yarn install --ignore-engines --ignore-scripts
    - name: Fetch
      run: yarn run fetch
    - name: Compile
      run: yarn run webpack:prod
    - name: Package
      run: |
        # Need to run the universal builds as separate commands or it breaks when @electron/universal
        # diffs the ASARs and finds spurious differences. Not clear why.
        node release-automation/build.mjs --mac --universal --production
        node release-automation/build.mjs --mac-legacy-11 --universal --production
        node release-automation/build.mjs --mac-legacy-10.13-10.14 --mac-legacy-10.15 --x64
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: mac
        path: dist/*.dmg
    - name: Upload package-lock.json
      uses: actions/upload-artifact@v4
      with:
        name: package-lock-mac
        path: package-lock.json

  build-windows:
    # GitHub's Windows runners have a C: drive and a D: drive.
    # C: is for the OS and has good read performance but awful write performance.
    # D: has much better faster write performance (>20x faster than C:)
    # We want to use the D: drive whenever we can. Trying to do "npm i" on the C:
    # drive has been observed to take over an hour!
    runs-on: windows-latest
    steps:
    # actions/checkout can only clone to paths in $GITHUB_WORKSPACE which is on the C: drive,
    # so we have to clone to C: then copy to D: after. This repository itself isn't huge so
    # this is plenty fast.
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        token: ${{ secrets.GITHUB_TOKEN }}
        path: repo
    - name: "Move repository to D: drive"
      run: |
        Copy-Item -Path repo -Destination D:\repo -Recurse
        Remove-Item -Path repo -Recurse -Force
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install Yarn
      run: npm install -g yarn

    - name: Install dependencies
      working-directory: D:\repo
      run: yarn install --ignore-engines --ignore-scripts
    - name: Fetch
      working-directory: D:\repo
      run: yarn run fetch
    - name: Compile
      working-directory: D:\repo
      run: yarn run webpack:prod
    - name: Package
      working-directory: D:\repo
      run: |
        node release-automation/build.mjs --windows --microsoft-store --x64 --ia32 --arm64
        node release-automation/build.mjs --windows-portable --x64
        node release-automation/build.mjs --windows-legacy --ia32 --x64
    - name: Print file tree
      working-directory: D:\repo
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: |
          D:\repo\dist\*.exe
          D:\repo\dist\*.appx
    - name: Upload package-lock.json
      uses: actions/upload-artifact@v4
      with:
        name: package-lock-windows
        path: D:\repo\package-lock.json
