name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install dependencies
      run: npm install
    - name: Prepare extensions
      # Don't need to do a full fetch, that would just cause a lot of unnecessary traffic
      run: node scripts/prepare-extensions.mjs && node scripts/download-penguinmod.mjs
    - name: Compile
      run: npm run webpack:compile
    - name: Upload webpack artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: windows-dist
        path: dist-renderer-webpack
    - name: Package
      run: npm run electron:package:dir
