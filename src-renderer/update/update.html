<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #333;
        background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", "Helvetica Neue", "Noto Sans", Helvetica, Arial, sans-serif;
        color: #fff;
        line-height: 1.5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      main {
        max-width: 860px;
        width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      @media (max-width: 720px) {
        body {
          padding: 1rem;
        }
      }
      h1 {
        font-size: 2.2rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-top: 0;
        margin-bottom: 0.25rem;
        color: #75C1C4;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }
      h2 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 1.8rem 0 0.75rem 0;
        color: #fff;
        letter-spacing: -0.2px;
        border-bottom: 1px solid rgba(117, 193, 196, 0.3);
        padding-bottom: 0.4rem;
      }
      p {
        margin: 1rem 0;
        font-weight: 450;
        color: #fff;
        line-height: 1.6;
      }
      i {
        color: #fff;
        font-style: italic;
      }
      a {
        color: #75C1C4;
        text-decoration: none;
        font-weight: 500;
        border-bottom: 1px solid #75C1C4;
        transition: all 0.2s;
      }
      a:hover {
        color: #3C7699;
        border-bottom-color: #3C7699;
        text-decoration: none;
      }
      strong, b {
        color: #fff;
        font-weight: 600;
      }
      button {
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 0.7rem 1.2rem;
        border-radius: 2rem;
        border: none;
        transition: all 0.2s ease;
        background: #2a2f36;
        color: #fff;
        margin-top: 0.25rem;
      }
      .download-button {
        background: #75C1C4;
        color: #0f1217;
        box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      }
      .download-button:hover {
        background: #5fa7aa;
        transform: translateY(-1px);
      }
      .ignore-button:hover {
        background: #3e454f;
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(1px);
      }
      .download-button, .ignore-button {
        width: calc(50% - 0.5rem);
        display: inline-block;
      }
      .download-button {
        margin-right: 0.5rem;
      }
      .ignore-button {
        margin-left: 0.5rem;
      }
      .button-group {
        display: flex;
        gap: 1rem;
        margin: 0.5rem 0;
      }
      .button-group button {
        flex: 1;
        width: auto;
      }
      label {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin: 0.5rem 0;
        font-size: 0.95rem;
        color: #fff;
      }
      input[type="checkbox"] {
        width: 1.1rem;
        height: 1.1rem;
        accent-color: #75C1C4;
        cursor: pointer;
      }
      .update-log ul {
        margin: 0.5rem 0 1rem 1.5rem;
        list-style-type: disc;
      }
      .update-log li {
        margin: 0.4rem 0;
        color: #e2e8f0;
      }
      .update-log h2 {
        margin: 1rem 0 0.5rem 0;
        border-bottom: none;
        font-size: 1.3rem;
      }
      .loading, .error, .empty {
        width: 100%;
        min-height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: 500;
        color: #aaa;
      }
      .error {
        color: #f87171;
      }
      .empty {
        color: #75C1C4;
      }
      .if-security {
        display: none;
      }
      .security .if-security {
        display: block;
      }
      .security .if-normal {
        display: none;
      }
      .security h1 {
        color: #facc15;
      }
      .security .download-button {
        background: #f97316;
        color: #fff;
      }
      .security .download-button:hover {
        background: #ea580c;
      }
      .update-log::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .update-log::-webkit-scrollbar-track {
        background: #1e2a36;
        border-radius: 8px;
      }
      .update-log::-webkit-scrollbar-thumb {
        background: #75C1C4;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <script>
        const {appName, locale, strings} = UpdatePreload.getStrings();
        document.documentElement.lang = locale;

        const info = UpdatePreload.getInfo();
        if (info.security) {
          document.body.classList.add('security');
        }
      </script>

      <h1 class="normal-title if-normal"></h1>
      <h1 class="security-title if-security"></h1>
      <script>
        document.querySelector('.normal-title').textContent = strings['update.normal-title'];
        document.querySelector('.security-title').textContent = strings['update.security-title'];
      </script>

      <p class="normal-description if-normal"></p>
      <p class="security-description if-security"></p>
      <script>
        const appNameVersion = `${appName} v${info.latestVersion}`;
        document.querySelector('.normal-description').textContent = strings['update.normal-description'].replace('{appNameVersion}', appNameVersion);
        document.querySelector('.security-description').textContent = strings['update.security-description'].replace('{appNameVersion}', appNameVersion);;
      </script>

      <div class="update-log">
        <p class="loading"></p>
      </div>
      <script>
        document.querySelector('.loading').textContent = strings['update.loading'];
      </script>

      <div class="button-group">
        <button class="download-button"></button>
        <button class="ignore-button"></button>
      </div>
      <script>
        const downloadButton = document.querySelector('.download-button');
        const ignoreButton = document.querySelector('.ignore-button');
        downloadButton.textContent = strings['update.download-button'];
        ignoreButton.textContent = strings['update.ignore-button'];
      </script>

      <label class="permanently-ignore-outer if-normal">
        <input type="checkbox" class="permanently-ignore-checkbox">
        <span class="permanently-ignore-label"></span>
      </label>

      <script>
        document.querySelector('.permanently-ignore-label').textContent = strings['update.permanently-ignore'];

        const permanentCheckbox = document.querySelector('.permanently-ignore-checkbox');
        downloadButton.addEventListener('click', () => {
          UpdatePreload.download();
        });
        ignoreButton.addEventListener('click', () => {
          UpdatePreload.ignore(permanentCheckbox.checked);
        });

        const A_IS_NEWER = 1;
        const B_IS_NEWER = 2;
        const compareVersions = (a, b) => {
          const partsA = a.split('-')[0].split('.');
          const partsB = b.split('-')[0].split('.');
          const expectedLength = 3;
          for (var i = 0; i < expectedLength; i++) {
            const itemA = +partsA[i];
            const itemB = +partsB[i];
            if (itemA > itemB) {
              return A_IS_NEWER;
            } else if (itemA < itemB) {
              return B_IS_NEWER;
            }
          }

          const prereleaseA = a.split('-')[1];
          const prereleaseB = b.split('-')[1];
          if (prereleaseA === prereleaseB) {
            return 0;
          } else if (prereleaseA && !prereleaseB) {
            return B_IS_NEWER;
          } else if (prereleaseB && !prereleaseA) {
            return A_IS_NEWER;
          } else if (prereleaseA > prereleaseB) {
            return A_IS_NEWER;
          } else {
            return B_IS_NEWER;
          }
        };

        const removeChildren = (el) => {
          while (el.firstChild) {
            el.removeChild(el.firstChild);
          }
        };

        const changelog = document.querySelector('.update-log');
        fetch(`https://desktop.bilup.org/changelog.json?version=${info.latestVersion}`)
          .then((res) => {
            if (!res.ok) {
              throw new Error(`HTTP error ${res.status}`);
            }
            return res.json();
          })
          .then((allReleases) => {
            removeChildren(changelog);

            const filteredReleases = allReleases.filter((release) => (
              // Only show notes that are newer than the current version
              compareVersions(info.currentVersion, release.version) === B_IS_NEWER &&
              // Only show notes that are older than the version we're upgrading to
              compareVersions(info.latestVersion, release.version) !== B_IS_NEWER
            ));

            if (filteredReleases.length) {
              changelog.lang = 'en';

              for (const {version, date, notes} of filteredReleases) {
                const titleElement = document.createElement('h2');
                titleElement.textContent = `v${version} (${date})`;
                changelog.appendChild(titleElement);

                const ul = document.createElement('ul');
                for (const note of notes) {
                  const li = document.createElement('li');
                  li.textContent = note;
                  ul.appendChild(li);
                }
                changelog.appendChild(ul);
              }
            } else {
              const p = document.createElement('p');
              p.className = 'empty';
              p.textContent = strings['update.not-available'];
              changelog.appendChild(p);
            }
          })
          .catch((error) => {
            console.error(error);

            removeChildren(changelog);
            const p = document.createElement('p');
            p.className = 'error';
            p.textContent = strings['update.changelog-error']
              .replace('{error}', `${error}`);
            changelog.appendChild(p);
          });
      </script>
    </main>
  </body>
</html>
